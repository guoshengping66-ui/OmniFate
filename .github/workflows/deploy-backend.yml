# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 后端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 backend/ 有变更，或手动触发
#  流程: SSH → kill 进程 → systemd 自动重启 (deploy.sh 拉取最新代码) → 健康检查
#
#  服务器配置:
#    /opt/OmniFate/deploy.sh — 拉取代码 + 启动 uvicorn
#    systemd Restart=always — 进程被杀后自动重启 deploy.sh
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "═══════ 开始部署后端 ═══════"

            # 1. 同步最新代码
            cd /opt/OmniFate

            # 修复目录权限 (root 拥有的文件 deploy 用户无法写入)
            echo "🔧 修复目录权限..."
            sudo chown -R $(whoami) /opt/OmniFate 2>/dev/null || true

            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"

            echo "📥 同步最新代码..."
            git fetch origin main
            git clean -fd 2>/dev/null || true
            git reset --hard origin/main || {
              echo "⚠️ git reset 失败，尝试修复权限后重试..."
              chmod -R u+w frontend/ 2>/dev/null || true
              git reset --hard origin/main
            }

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "新 commit: $NEW_COMMIT"

            # 2. 检测部署方式: Docker 或 PM2
            if command -v docker >/dev/null 2>&1 && [ -f docker-compose.yml ]; then
              echo "🐳 检测到 Docker，使用 docker compose 重新构建并部署..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps backend
              echo "⏳ 等待容器启动..."
              sleep 10
            else
              echo "📦 使用 PM2 部署..."
              # 修复目录权限
              echo "🔧 修复目录权限..."
              sudo chown -R $(whoami) /opt/OmniFate/backend 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              pip install -r backend/requirements.txt --quiet 2>/dev/null || \
                pip3 install -r backend/requirements.txt --quiet 2>/dev/null || \
                echo "⚠️ pip install 失败，跳过"

              # 杀掉旧进程触发 PM2 自动重启
              PID=$(lsof -ti :8002 2>/dev/null || true)
              if [ -n "$PID" ]; then
                kill "$PID" 2>/dev/null || true
                echo "已停止进程: $PID"
              else
                fuser -k 8002/tcp 2>/dev/null || true
              fi

              pm2 restart backend 2>/dev/null || pm2 start ecosystem.config.js --only backend 2>/dev/null || true
              pm2 save 2>/dev/null || true
              echo "⏳ 等待服务重启..."
              sleep 10
            fi

            # 3. 健康检查
            echo "🔍 健康检查..."
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTH_OK=true
                echo "✅ 健康检查通过 (第${i}次)"
                break
              fi
              echo "⚠️ 第${i}次健康检查失败 (HTTP $HTTP_CODE)，等待重试..."
              sleep 5
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "❌ 健康检查失败！请手动检查服务器"
              exit 1
            fi

            echo "═══════ 部署完成 ═══════"
            echo "✅ 后端已更新: $CURRENT_COMMIT → $NEW_COMMIT"
