# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 后端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 backend/ 有变更，或手动触发
#  流程: SSH → git pull → pip install → PM2 restart → 健康检查
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "═══════ 开始部署后端 ═══════"

            # 1. 同步最新代码
            cd /opt/OmniFate

            echo "🔧 修复目录权限..."
            sudo chown -R $(whoami) /opt/OmniFate 2>/dev/null || true

            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"

            echo "📥 同步最新代码..."
            git fetch origin main
            git clean -fd 2>/dev/null || true
            git reset --hard origin/main || {
              echo "⚠️ git reset 失败，尝试修复权限后重试..."
              chmod -R u+w frontend/ 2>/dev/null || true
              git reset --hard origin/main
            }

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "新 commit: $NEW_COMMIT"

            # 2. 安装依赖
            echo "📦 安装 Python 依赖..."
            sudo chown -R $(whoami) /opt/OmniFate/backend 2>/dev/null || true
            pip install -r backend/requirements.txt --quiet 2>/dev/null || \
              pip3 install -r backend/requirements.txt --quiet 2>/dev/null || \
              echo "⚠️ pip install 失败，跳过"

            # 3. 强制停止旧进程并重启
            echo "🔧 停止旧后端进程..."
            pm2 stop backend 2>/dev/null || true
            pm2 delete backend 2>/dev/null || true
            # 确保端口释放
            fuser -k 8003/tcp 2>/dev/null || true
            sleep 2

            # 清理 Python 字节码缓存
            find /opt/OmniFate/backend -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

            # 重新启动
            echo "🚀 启动新后端进程..."
            cd /opt/OmniFate
            pm2 start ecosystem.config.js --only backend
            pm2 save 2>/dev/null || true
            echo "⏳ 等待服务重启..."
            sleep 15

            # 4. 健康检查
            echo "🔍 健康检查..."
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8003/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTH_OK=true
                echo "✅ 健康检查通过 (第${i}次)"
                break
              fi
              echo "⚠️ 第${i}次健康检查失败 (HTTP $HTTP_CODE)，等待重试..."
              sleep 5
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "❌ 健康检查失败！请手动检查服务器"
              exit 1
            fi

            echo "═══════ 部署完成 ═══════"
            echo "✅ 后端已更新: $CURRENT_COMMIT → $NEW_COMMIT"
