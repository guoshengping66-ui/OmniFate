              cd /opt/OmniFate
              # 鈿狅笍 蹇呴』鐢?delete + start锛屼笉鑳界敤 restart锛?              # restart 浼氬鐢ㄦ棫杩涚▼鐨勫唴瀛樼紦瀛橈紝瀵艰嚧 RSC manifest 涓殑 chunk hash 鏄棫鐨?              pm2 delete frontend 2>/dev/null || true
              # 鍚屾椂鍋滄 root 鐢ㄦ埛鐨?PM2 frontend锛堥槻姝?root PM2 鑷姩閲嶅惎鍥炴棫浠ｇ爜锛?              sudo pm2 delete frontend 2>/dev/null || true
              # 纭繚绔彛 3000 閲婃斁 鈥?鏉€姝讳换浣曟畫鐣欒繘绋嬶紙鍖呮嫭 root 鎷ユ湁鐨勶級
              for i in 1 2 3 4 5; do
