# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 后端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 backend/ 有变更，或手动触发
#  流程: SSH → systemctl restart (服务自动 git pull) → 健康检查
#
#  服务器 systemd 服务配置 (ExecStartPre 自动拉取最新代码):
#    ExecStartPre=/bin/bash -c 'cd /opt/OmniFate && git pull origin main'
#    Restart=on-failure
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "═══════ 开始部署后端 ═══════"

            # 1. 记录当前 commit
            cd /opt/OmniFate
            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"

            # 2. 重启服务 (ExecStartPre 会自动 git pull)
            echo "🔄 重启服务..."
            systemctl restart omnifate-backend

            # 3. 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 8

            # 4. 验证新 commit
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "新 commit: $NEW_COMMIT"

            # 5. 健康检查
            echo "🔍 健康检查..."
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTH_OK=true
                echo "✅ 健康检查通过 (第${i}次)"
                break
              fi
              echo "⚠️ 第${i}次健康检查失败 (HTTP $HTTP_CODE)，等待重试..."
              sleep 5
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "❌ 健康检查失败！请手动检查服务器"
              exit 1
            fi

            echo "═══════ 部署完成 ═══════"
            echo "✅ 后端已更新: $CURRENT_COMMIT → $NEW_COMMIT"
