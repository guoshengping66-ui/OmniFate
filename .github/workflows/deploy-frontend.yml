# ══════════════════════════════════════════════════════════════════════════════
#  Profile Mirror — 前端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 frontend/ 有变更，或手动触发
#  流程: SSH → git pull → npm build → PM2 restart
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'ecosystem.config.js'
      - 'deploy-frontend.sh'
      - 'nginx-khanfate.conf'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Purge Cloudflare BEFORE deploy so verification sees fresh HTML ──
      - name: Pre-purge Cloudflare cache
        if: vars.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_API_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🔄 预清除 Cloudflare 缓存 (防止验证时读到旧 HTML)..."
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' && echo "✅ Cloudflare 缓存已预清除" || echo "⚠️ 预清除失败"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CF_ZONE_ID,CF_API_TOKEN
          script: |
            set -euo pipefail

            echo "═══════ 开始部署前端 ═══════"

            # 0. 预检: 磁盘空间 + 环境信息 + 清理 lock 文件
            echo "🔍 预检..."
            echo "   Node.js: $(node -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   npm: $(npm -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   whoami: $(whoami)"
            echo "   磁盘: $(df -h / 2>/dev/null | tail -1)"
            echo "   内存: $(free -m 2>/dev/null | grep Mem | awk '{print $2 "MB total, " $4 "MB free"}')"
            DISK_USAGE=$(df -h / | awk 'NR==2{print $5}' | tr -d '%')
            echo "   磁盘使用率: ${DISK_USAGE}%"
            if [ "$DISK_USAGE" -gt 85 ]; then
              echo "⚠️  磁盘使用率超过 85%，尝试清理空间..."
              sudo journalctl --vacuum-size=50M 2>/dev/null || true
              sudo apt-get clean 2>/dev/null || true
              sudo rm -rf /tmp/webpack* /tmp/npm-* 2>/dev/null || true
              # Also clean npm cache which can grow large
              sudo npm cache clean --force 2>/dev/null || true
              echo "   清理后磁盘: $(df -h / 2>/dev/null | tail -1)"
            fi

            # 1. 同步最新代码
            cd /opt/OmniFate

            # 修复目录权限 (root 拥有的文件 deploy 用户无法写入)
            echo "🔧 修复目录权限..."
            sudo chown -R $(whoami) /opt/OmniFate 2>/dev/null || true

            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"
            echo "当前 commit message: $(git log -1 --format='%s')"

            echo "📥 同步最新代码..."
            # 彻底清理 git lock 文件（用 sudo 确保删除权限）
            sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            # 清除过期的远程跟踪引用，防止快速连续推送导致 ref 冲突
            git remote prune origin 2>/dev/null || true
            git update-ref -d refs/remotes/origin/main 2>/dev/null || true
            git fetch origin main || {
              echo "⚠️ git fetch 失败，清理后重试..."
              sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/.git 2>/dev/null || true
              git fetch origin main
            }
            git clean -fd 2>/dev/null || true
            sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            git reset --hard origin/main || {
              echo "⚠️ git reset 失败，尝试修复权限后重试..."
              sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/.git 2>/dev/null || true
              chmod -R u+w frontend/ 2>/dev/null || true
              git reset --hard origin/main
            }

            # 2. 部署 Nginx 配置 (跳过如果 sites-available 不存在)
            echo "🌐 更新 Nginx 配置..."
            if [ -d /etc/nginx/sites-available ]; then
              cp /opt/OmniFate/nginx-khanfate.conf /etc/nginx/sites-available/khanfate.conf
              ln -sf /etc/nginx/sites-available/khanfate.conf /etc/nginx/sites-enabled/
              nginx -t 2>/dev/null && systemctl reload nginx && echo "✅ Nginx 已更新" || echo "⚠️ Nginx 配置检查失败"
            else
              echo "⚠️ /etc/nginx/sites-available 不存在，跳过 Nginx 配置更新"
            fi

            # 3. 检测部署方式: Docker 或 PM2
            if command -v docker >/dev/null 2>&1 && [ -f docker-compose.yml ]; then
              echo "🐳 检测到 Docker，重新构建并部署前端容器..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build frontend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend
              echo "⏳ 等待容器启动..."
              sleep 10
            else
              echo "📦 使用 PM2 部署前端..."

              # ⚠️ 先构建，成功后再停旧服务 — 防止构建失败导致网站下线
              cd /opt/OmniFate/frontend
              sudo chown -R $(whoami) . 2>/dev/null || true

              echo "🧹 清理旧构建产物 + webpack 缓存..."
              sudo rm -rf /opt/OmniFate/frontend/.next 2>/dev/null || true
              sudo rm -rf /opt/OmniFate/frontend/.turbo 2>/dev/null || true
              sudo rm -rf /opt/OmniFate/frontend/node_modules/.cache 2>/dev/null || true
              sudo rm -rf /tmp/webpack* 2>/dev/null || true
              sudo rm -rf /root/.cache/webpack* 2>/dev/null || true
              sudo rm -rf /tmp/turbopack* 2>/dev/null || true
              sudo rm -rf /root/.cache/turbopack* 2>/dev/null || true
              sudo rm -rf /tmp/next-* 2>/dev/null || true
              # Clear any leftover Next.js trace files
              sudo rm -f /opt/OmniFate/frontend/.next 2>/dev/null || true
              echo "✅ 清理完成"

              echo "📥 安装依赖..."
              npm install --production=false
              sudo chown -R $(whoami) . 2>/dev/null || true

              # ⚠️ 构建前再次清理 .next，防止旧 root 权限目录导致 EACCES
              sudo rm -rf /opt/OmniFate/frontend/.next 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              echo "🔨 构建生产版本 (standalone)..."
              # ⚠️ 禁用 webpack 缓存，确保每次构建都是全新的
              NODE_ENV=production NEXT_TELEMETRY_DISABLED=1 npm run build
              # ⚠️ 关键: build 过程中会以 root 创建 .next/types/ 和 .next/standalone/ 等目录
              # 必须在 build 后 chown，否则下次构建会因 EACCES 失败
              sudo chown -R $(whoami) .next 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              # ── Verify build output ──
              echo "🔍 验证构建产物..."
              BUILD_PAGE_COUNT=$(find .next/server/app -name "*.html" 2>/dev/null | wc -l)
              # Also check for SSG manifest (Next.js 15 may not produce .html in server/app)
              SSG_MANIFEST=$(find .next/server -name "_ssgManifest.js" -o -name "_app-dev-indicator.js" 2>/dev/null | wc -l)
              echo "   Pre-rendered pages: $BUILD_PAGE_COUNT, SSG manifest: $SSG_MANIFEST"
              if [ "$BUILD_PAGE_COUNT" -lt 1 ] && [ "$SSG_MANIFEST" -lt 1 ]; then
                echo "⚠️  构建异常: 没有找到预渲染页面或 SSG 产物（非致命，继续部署）"
              fi

              # Determine standalone path — prioritize where server.js actually lives
              STANDALONE_DIR=""
              if [ -f ".next/standalone/server.js" ]; then
                STANDALONE_DIR=".next/standalone"
              elif [ -d ".next/standalone/frontend" ] && [ -f ".next/standalone/frontend/server.js" ]; then
                STANDALONE_DIR=".next/standalone/frontend"
              else
                echo "❌ 未找到 standalone 目录"
                ls -la .next/standalone/ 2>/dev/null || echo "   .next/standalone 不存在"
                exit 1
              fi
              echo "   Standalone 目录: $STANDALONE_DIR"

              # ⚠️ 关键: 复制 static 和 public 到 standalone 目录
              # standalone 构建可能不包含完整的 .next/static，必须手动同步
              # ⚠️ 必须先 rm -rf 再 mkdir + cp，否则 cp -r 会合并而非替换
              echo "📋 复制静态文件到 standalone 目录..."
              echo "   当前目录: $(pwd)"

              # 详细检查源目录
              echo "   === 源目录 .next/static/ 内容 ==="
              find .next/static/ -type f -name "*.js" 2>/dev/null | wc -l | xargs echo "   JS 文件总数:"
              find .next/static/chunks/ -type f 2>/dev/null | wc -l | xargs echo "   chunks 目录文件总数:"

              # 清理目标目录
              sudo rm -rf "$STANDALONE_DIR/.next/static" 2>/dev/null || true
              sudo mkdir -p "$STANDALONE_DIR/.next/static"

              # 复制静态文件
              # ⚠️ CRITICAL: Do NOT use `cp -r .next/static/*` — bash glob expansion
              # interprets `[locale]` directory name as a character class `[cl oe]`,
              # causing the entire app/ subtree (including checkout chunks) to be skipped.
              # Use tar pipe to copy contents — bypasses glob expansion entirely.
              echo "   === 执行复制 ==="
              sudo tar cf - -C .next/static . | sudo tar xf - -C "$STANDALONE_DIR/.next/static/" || { echo "❌ cp static 失败"; exit 1; }
              echo "   cp static 完成"

              # 复制 public
              sudo rm -rf "$STANDALONE_DIR/public" 2>/dev/null || true
              sudo cp -r public "$STANDALONE_DIR/public" 2>/dev/null || true

              # ⚠️ 关键: 同步 BUILD_ID 和 build manifest，确保 standalone 的 RSC manifest
              # 与 static 文件中的 chunk hash 一致，防止服务器返回旧 chunk 引用
              echo "   === 同步构建 manifest 到 standalone ==="
              sudo cp -f .next/BUILD_ID "$STANDALONE_DIR/.next/BUILD_ID" 2>/dev/null || true
              sudo cp -f .next/build-manifest.json "$STANDALONE_DIR/.next/build-manifest.json" 2>/dev/null || true
              sudo cp -f .next/prerender-manifest.json "$STANDALONE_DIR/.next/prerender-manifest.json" 2>/dev/null || true
              sudo cp -f .next/routes-manifest.json "$STANDALONE_DIR/.next/routes-manifest.json" 2>/dev/null || true
              sudo cp -f .next/images-manifest.json "$STANDALONE_DIR/.next/images-manifest.json" 2>/dev/null || true
              # Sync server manifests (contain chunk mappings used by RSC)
              if [ -d ".next/server" ] && [ -d "$STANDALONE_DIR/.next/server" ]; then
                sudo cp -f .next/server/middleware-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/next-font-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/pages-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/app-paths-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/server-reference-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                echo "   ✅ server manifests 已同步"
              fi
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              # 验证目标目录 (用 || true 防止 set -e 误退出)
              JS_COUNT=$(find "$STANDALONE_DIR/.next/static/" -type f -name "*.js" 2>/dev/null | wc -l || echo 0)
              CHUNK_COUNT_L=$(find "$STANDALONE_DIR/.next/static/chunks/" -type f 2>/dev/null | wc -l || echo 0)
              echo "   JS 文件总数: $JS_COUNT, chunks 文件总数: $CHUNK_COUNT_L"

              # ⚠️ 验证: standalone 目录必须包含 chunks，否则部署会白跑
              CHUNK_COUNT=$(find "$STANDALONE_DIR/.next/static/chunks" -name "*.js" 2>/dev/null | wc -l || echo 0)
              if [ "$CHUNK_COUNT" -lt 10 ]; then
                echo "❌ 验证失败: standalone 目录只有 $CHUNK_COUNT 个 chunk 文件（预期 >10）"
                echo "   这可能导致页面 404，但继续部署..."
                # Don't exit — the build may have restructured chunks
              fi

              # ⚠️ 验证: 检测嵌套路径错误 (static/static/chunks)
              NESTED_COUNT=$(find "$STANDALONE_DIR/.next/static/static" -name "*.js" 2>/dev/null | wc -l || echo 0)
              if [ "$NESTED_COUNT" -gt 0 ]; then
                echo "❌ 检测到嵌套目录错误: static/static/ (共 $NESTED_COUNT 个文件)"
                echo "   修复中: 移动文件到正确位置..."
                sudo mv "$STANDALONE_DIR/.next/static/static/"* "$STANDALONE_DIR/.next/static/" 2>/dev/null || true
                sudo rm -rf "$STANDALONE_DIR/.next/static/static"
                echo "✅ 已修复嵌套目录"
              fi
              echo "✅ 验证通过: standalone 目录有 $CHUNK_COUNT 个 chunk 文件"

              # 🔑 验证: 首页 page chunk 必须存在，否则首页白屏
              PAGE_CHUNK=$(find "$STANDALONE_DIR/.next/static/chunks/app/[locale]" -maxdepth 1 -name "page-*.js" 2>/dev/null | head -1)
              if [ -z "$PAGE_CHUNK" ]; then
                echo "⚠️  验证警告: standalone 目录缺少首页 page chunk（非致命）"
              else
                echo "✅ 首页 page chunk 验证通过: $(basename $PAGE_CHUNK)"
              fi

              # 🔑 验证: checkout 等子路由 page chunk 必须存在
              CHECKOUT_PAGE=$(find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -maxdepth 1 -name "page-*.js" 2>/dev/null | head -1)
              if [ -z "$CHECKOUT_PAGE" ]; then
                echo "⚠️  standalone 目录缺少 checkout page chunk，尝试修复..."
                # Try multiple source paths (server may have different directory structure)
                for SRC_PATH in \
                  ".next/static/chunks/app/\[locale\]/checkout" \
                  ".next/static/chunks/app/[locale]/checkout"; do
                  SRC_CHECKOUT=$(find "$SRC_PATH" -maxdepth 1 -name "page-*.js" 2>/dev/null | head -1)
                  if [ -n "$SRC_CHECKOUT" ]; then
                    echo "   找到源: $SRC_CHECKOUT"
                    sudo mkdir -p "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout"
                    sudo cp "$SRC_CHECKOUT" "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout/"
                    CHECKOUT_PAGE=$(find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -maxdepth 1 -name "page-*.js" 2>/dev/null | head -1)
                    break
                  fi
                done
                # If still missing, try copying ALL checkout files from source
                if [ -z "$CHECKOUT_PAGE" ]; then
                  echo "   尝试复制整个 checkout chunks 目录..."
                  sudo mkdir -p "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout"
                  sudo cp -r .next/static/chunks/app/\[locale\]/checkout/* "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout/" 2>/dev/null || true
                  CHECKOUT_PAGE=$(find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -maxdepth 1 -name "page-*.js" 2>/dev/null | head -1)
                fi
              fi
              if [ -n "$CHECKOUT_PAGE" ]; then
                echo "✅ checkout page chunk: $(basename $CHECKOUT_PAGE)"
              else
                echo "⚠️  checkout page chunk 仍然缺失 (error/loading chunks 存在，页面可能仍可加载)"
              fi

              # ── COMPREHENSIVE DIAGNOSTICS: What's actually on disk ──
              echo ""
              echo "═══════════ 部署诊断 ═══════════"
              # 1. BUILD_ID
              DISK_BUILD_ID=$(cat "$STANDALONE_DIR/.next/BUILD_ID" 2>/dev/null || echo "MISSING")
              echo "   [BUILD_ID on disk] $DISK_BUILD_ID"

              # 2. All checkout-related files in standalone
              echo "   [checkout chunks in standalone]"
              find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -type f 2>/dev/null | while read f; do echo "     $(basename $f)"; done
              if [ -z "$(find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -type f 2>/dev/null)" ]; then
                echo "     (EMPTY — no files!)"
              fi

              # 3. All checkout-related files in source .next/static
              echo "   [checkout chunks in source .next/static]"
              find .next/static/chunks/app/\[locale\]/checkout -type f 2>/dev/null | while read f; do echo "     $(basename $f)"; done
              if [ -z "$(find .next/static/chunks/app/\[locale\]/checkout -type f 2>/dev/null)" ]; then
                echo "     (EMPTY — no files!)"
              fi

              # 4. All page-*.js in [locale] directory (standalone)
              echo "   [all page chunks under [locale] in standalone]"
              find "$STANDALONE_DIR/.next/static/chunks/app/[locale]" -name "page-*.js" 2>/dev/null | while read f; do
                REL=${f#*$STANDALONE_DIR/.next/static/chunks/app/[locale]/}
                echo "     $REL"
              done

              # 5. Pre-rendered HTML for checkout — what chunk hash does it reference?
              echo "   [pre-rendered HTML chunk references]"
              # Check standalone server output
              CHECKOUT_HTML=$(find "$STANDALONE_DIR" -path "*/server/app/*/checkout/index.html" -o -path "*/server/app/*/checkout.html" 2>/dev/null | head -1)
              if [ -n "$CHECKOUT_HTML" ]; then
                echo "     HTML file: $CHECKOUT_HTML"
                grep -oE 'page-[a-f0-9]+\.js' "$CHECKOUT_HTML" 2>/dev/null | sort -u | while read chunk; do
                  echo "       references: $chunk"
                  # Check if this chunk exists in static
                  FOUND=$(find "$STANDALONE_DIR/.next/static/chunks" -name "$chunk" 2>/dev/null | head -1)
                  if [ -n "$FOUND" ]; then
                    echo "       ✅ EXISTS in static"
                  else
                    echo "       ❌ NOT FOUND in static — THIS IS THE BUG!"
                  fi
                done
              else
                echo "     No pre-rendered checkout HTML found in standalone"
                # Try source .next/server
                SRC_HTML=$(find .next/server/app -path "*checkout/index.html" -o -path "*checkout.html" 2>/dev/null | head -1)
                if [ -n "$SRC_HTML" ]; then
                  echo "     Source HTML: $SRC_HTML"
                  grep -oE 'page-[a-f0-9]+\.js' "$SRC_HTML" 2>/dev/null | sort -u | while read chunk; do echo "       references: $chunk"; done
                fi
              fi

              # 6. Check the running server's actual BUILD_ID
              RUNNING_BUILD_ID=$(curl -s http://127.0.0.1:3000/api/version 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('buildId',''))" 2>/dev/null || echo "N/A")
              echo "   [RUNNING server BUILD_ID] $RUNNING_BUILD_ID"
              echo "════════════════════════════════════"

              # 🔑 验证: webpack chunk 存在性检查
              WEBPACK_CHUNK=$(find "$STANDALONE_DIR/.next/static/chunks" -name "webpack-*.js" 2>/dev/null | head -1)
              if [ -z "$WEBPACK_CHUNK" ]; then
                echo "⚠️  验证警告: standalone 目录缺少 webpack chunk（可能使用 Turbopack）"
              else
                echo "✅ Webpack chunk 验证通过: $(basename $WEBPACK_CHUNK)"
              fi

              # 🔑 验证: pre-rendered HTML 引用的 chunk 必须在 standalone 中存在
              BUILD_LAYOUT=$(find "$STANDALONE_DIR/.next/static/chunks/app" -name "layout-*.js" 2>/dev/null | head -1)
              if [ -n "$BUILD_LAYOUT" ]; then
                echo "   Layout chunk: $(basename $BUILD_LAYOUT)"
              else
                echo "⚠️  验证警告: standalone 缺少 layout chunk（非致命）"
              fi

              # ── Purge Cloudflare cache for _next/static/ BEFORE restart ──
              # Prevents Cloudflare from caching stale 404s during the gap
              # when old chunks were deleted but new ones aren't served yet.
              if [ -n "${CF_ZONE_ID:-}" ] && [ -n "${CF_API_TOKEN:-}" ]; then
                echo "🔄 清除 Cloudflare 缓存 (防止旧 chunk 404 被缓存)..."
                # Purge everything — safest after a full rebuild
                PURGE_RESP=$(curl -s -w "\n%{http_code}" \
                  -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"purge_everything":true}')
                PURGE_HTTP=$(echo "$PURGE_RESP" | tail -1)
                if [ "$PURGE_HTTP" = "200" ]; then
                  echo "✅ Cloudflare 全局缓存已清除"
                else
                  echo "⚠️ Cloudflare 缓存清除返回 HTTP $PURGE_HTTP"
                  echo "   响应: $(echo "$PURGE_RESP" | head -1)"
                fi
              else
                echo "⚠️ 未配置 CF_ZONE_ID/CF_API_TOKEN，跳过 Cloudflare 缓存清除"
              fi

              echo "🔄 启动前端服务 (delete + start，确保清除内存缓存)..."
              cd /opt/OmniFate
              # ⚠️ 必须用 delete + start，不能用 restart！
              # restart 会复用旧进程的内存缓存，导致 RSC manifest 中的 chunk hash 是旧的
              pm2 delete frontend 2>/dev/null || true
              # 确保端口 3000 释放 — 杀死任何残留进程
              for i in 1 2 3 4 5; do
                if fuser 3000/tcp >/dev/null 2>&1; then
                  echo "⚠️ 端口 3000 仍被占用，第${i}次尝试释放..."
                  fuser -k 3000/tcp 2>/dev/null || true
                  sleep 2
                else
                  echo "✅ 端口 3000 已释放"
                  break
                fi
              done
              sleep 2
              pm2 start ecosystem.config.js --only frontend
              pm2 save

              sleep 5

              # ⚠️ 关键: STANDALONE_DIR 是相对路径，必须先 cd 回 frontend 目录才能正确读取
              cd /opt/OmniFate/frontend

              # ── Post-deploy verification ──
              echo "🔍 验证服务器正在运行新构建..."

              # 1. Check PM2 is running
              PM2_STATUS=$(pm2 jlist 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print(d[0]['pm2_env']['status'] if d else 'stopped')" 2>/dev/null || echo "unknown")
              echo "   PM2 frontend status: $PM2_STATUS"
              if [ "$PM2_STATUS" != "online" ]; then
                echo "❌ PM2 frontend 不在线！尝试 delete + start..."
                cd /opt/OmniFate
                pm2 delete frontend 2>/dev/null || true
                pm2 start ecosystem.config.js --only frontend
                pm2 save
                sleep 10
              fi

              # 2. Check API buildId (via localhost to bypass Cloudflare)
              NEW_BUILD_ID=$(cat "$STANDALONE_DIR/.next/BUILD_ID" 2>/dev/null || echo "unknown")
              API_BUILD_ID=$(curl -s http://127.0.0.1:3000/api/version 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('buildId',''))" 2>/dev/null || echo "")
              echo "   Build ID on disk: $NEW_BUILD_ID"
              echo "   Build ID from API (localhost): $API_BUILD_ID"

              # ═══ Diagnostics: understand standalone structure ═══
              echo "   === Standalone 目录诊断 ==="
              echo "   standalone server.js: $(ls -la "$STANDALONE_DIR/server.js" 2>/dev/null || echo 'MISSING')"
              echo "   standalone .next dir: $(ls -d "$STANDALONE_DIR/.next" 2>/dev/null || echo 'MISSING')"
              echo "   appDir in required-server-files: $(python3 -c "import json;d=json.load(open('$STANDALONE_DIR/.next/required-server-files.json'));print(d.get('appDir','N/A'))" 2>/dev/null || echo 'parse failed')"
              if [ -d ".next/standalone/frontend" ]; then
                echo "   ⚠️  .next/standalone/frontend/ 子目录存在 (双重嵌套)"
                echo "   frontend/ 内有: $(ls '.next/standalone/frontend/' 2>/dev/null | tr '\n' ' ')"
              fi
              # Compare parent vs standalone manifests
              PARENT_WEBPACK=$(grep -oE 'webpack-[a-f0-9]+\.js' .next/build-manifest.json 2>/dev/null | head -1 || echo 'none')
              STANDALONE_WEBPACK=$(grep -oE 'webpack-[a-f0-9]+\.js' "$STANDALONE_DIR/.next/build-manifest.json" 2>/dev/null | head -1 || echo 'none')
              echo "   parent build-manifest webpack: $PARENT_WEBPACK"
              echo "   standalone build-manifest webpack: $STANDALONE_WEBPACK"
              echo "   ==============================="

              # 3. Verify new webpack chunk exists in standalone
              NEW_WEBPACK=$(find "$STANDALONE_DIR/.next/static/chunks" -name "webpack-*.js" 2>/dev/null | head -1 || true)
              if [ -n "$NEW_WEBPACK" ]; then
                WEBPACK_NAME=$(basename "$NEW_WEBPACK")
                echo "   New webpack chunk: $WEBPACK_NAME"
                # Check via localhost (bypass Cloudflare)
                HTTP_CHECK=$(curl -s "http://127.0.0.1:3000/_next/static/chunks/$WEBPACK_NAME" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
                echo "   HTTP status (localhost): $HTTP_CHECK"
                if [ "$HTTP_CHECK" != "200" ]; then
                  echo "⚠️  新构建的 webpack chunk 无法通过 localhost 访问 (HTTP $HTTP_CHECK)"
                fi
              fi

              # 4. Verify HTML references match new build (check via localhost)
              # Use || true throughout — grep may not match and set -e kills the script
              HTML_RESPONSE=$(curl -s http://127.0.0.1:3000/zh 2>/dev/null || true)
              HTML_WEBPACK=$(echo "$HTML_RESPONSE" | grep -oE 'webpack-[a-f0-9]+\.js' 2>/dev/null | head -1 || true)
              echo "   HTML webpack ref (localhost): ${HTML_WEBPACK:-none}"

              if [ -n "$NEW_WEBPACK" ] && [ -n "$HTML_WEBPACK" ]; then
                NEW_WNAME=$(basename "$NEW_WEBPACK")
                if [ "$HTML_WEBPACK" = "$NEW_WNAME" ]; then
                  echo "✅ 部署验证通过: localhost HTML 引用的 chunk 与构建产物匹配"
                else
                  echo "⚠️  localhost HTML 引用旧 chunk ($HTML_WEBPACK) != 新 chunk ($NEW_WNAME)"
                  echo "   尝试强制重启 PM2..."
                  cd /opt/OmniFate
                  pm2 delete frontend 2>/dev/null || true
                  # Kill any remaining process on port 3000
                  fuser -k 3000/tcp 2>/dev/null || true
                  sleep 3
                  pm2 start ecosystem.config.js --only frontend
                  pm2 save
                  sleep 8
                  # Re-check via localhost
                  HTML_RESPONSE2=$(curl -s http://127.0.0.1:3000/zh 2>/dev/null || true)
                  HTML_WEBPACK2=$(echo "$HTML_RESPONSE2" | grep -oE 'webpack-[a-f0-9]+\.js' 2>/dev/null | head -1 || true)
                  if [ "$HTML_WEBPACK2" = "$NEW_WNAME" ]; then
                    echo "✅ 重启后验证通过"
                  else
                    echo "⚠️  重启后仍然不匹配: ${HTML_WEBPACK2:-none} != $NEW_WNAME"
                    echo "   这可能是 standalone 的 appDir 路径问题，非致命"
                  fi
                fi
              fi

              # 5. Verify checkout page (non-fatal — warn only)
              echo "   [checkout page verification]"
              cd /opt/OmniFate/frontend
              CHECKOUT_RESPONSE=$(curl -s http://127.0.0.1:3000/zh/checkout 2>/dev/null || true)
              CHECKOUT_PAGE_REF=$(echo "$CHECKOUT_RESPONSE" | grep -oE 'checkout/page-[a-f0-9]+\.js' 2>/dev/null | head -1 || true)
              echo "   checkout page chunk ref: ${CHECKOUT_PAGE_REF:-none}"
              if [ -n "$CHECKOUT_PAGE_REF" ]; then
                CHECKOUT_CHUNK_NAME=$(basename "$CHECKOUT_PAGE_REF" 2>/dev/null || true)
                CHECKOUT_FOUND=$(find "$STANDALONE_DIR/.next/static/chunks" -name "$CHECKOUT_CHUNK_NAME" 2>/dev/null | head -1 || true)
                if [ -n "$CHECKOUT_FOUND" ]; then
                  echo "   ✅ checkout chunk exists: $CHECKOUT_CHUNK_NAME"
                else
                  echo "   ⚠️  checkout chunk missing in standalone: $CHECKOUT_CHUNK_NAME (非致命)"
                  echo "   Available checkout chunks:"
                  find "$STANDALONE_DIR/.next/static/chunks/app/[locale]/checkout" -name "page-*.js" 2>/dev/null | while read f; do echo "     $(basename $f)"; done || true
                fi
              else
                echo "   ⚠️  Could not extract checkout page chunk ref (server may still be starting)"
              fi
            fi

            # 4. 验证
            echo "🔍 验证服务..."
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ]; then
              echo "✅ 前端健康检查通过 (HTTP $HTTP_CODE)"
            else
              echo "⚠️ 前端健康检查返回 HTTP $HTTP_CODE，可能需要手动检查"
            fi

            # 清除 nginx proxy_cache (防止旧 HTML 被缓存)
            if [ -d /var/cache/nginx/html ]; then
              sudo rm -rf /var/cache/nginx/html/* 2>/dev/null && echo "✅ nginx 缓存已清除" || echo "⚠️ nginx 缓存清除失败"
            fi

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "═══════ 部署完成 ═══════"
            echo "✅ 前端已更新: $CURRENT_COMMIT → $NEW_COMMIT"

      # ── Purge Cloudflare cache (prevents stale HTML → chunk 404) ──
      - name: Purge Cloudflare cache
        if: success() && vars.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_API_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🔄 清除 Cloudflare 全部缓存..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Cloudflare 缓存已清除"
          else
            echo "⚠️ Cloudflare 缓存清除返回 HTTP $HTTP_CODE"
            echo "   响应: $BODY"
          fi

          # Also purge specific critical URLs to be safe
          echo "🔄 额外清除关键页面缓存..."
          for URL in "https://www.khanfate.com/" "https://www.khanfate.com/zh" "https://www.khanfate.com/en"; do
            curl -s -o /dev/null \
              -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"files\":[\"$URL\"]}" && echo "   已清除: $URL" || echo "   ⚠️ 清除失败: $URL"
          done
