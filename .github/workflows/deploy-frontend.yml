name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'ecosystem.config.js'
      - 'nginx-khanfate.conf'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-v2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 鈹€鈹€ Purge Cloudflare BEFORE deploy so verification sees fresh HTML 鈹€鈹€
      - name: Pre-purge Cloudflare cache
        if: vars.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_API_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "馃攧 棰勬竻闄?Cloudflare 缂撳瓨 (闃叉楠岃瘉鏃惰鍒版棫 HTML)..."
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' && echo "鉁?Cloudflare 缂撳瓨宸查娓呴櫎" || echo "鈿狅笍 棰勬竻闄ゅけ璐?

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CF_ZONE_ID,CF_API_TOKEN
          timeout: 30s
          command_timeout: 40m
          debug: true
          script: |
            set -euo pipefail

            # The host has limited RAM. A second concurrent Next build can
            # starve Nginx and SSH, so fail safely instead of competing.
            sudo rm -f /tmp/omnifate-frontend-build.lock 2>/dev/null || true
            exec 9>/tmp/omnifate-frontend-build.lock
            if ! flock -n 9; then
              echo "Another frontend build is already running; aborting this deployment."
              exit 1
            fi

            echo "鈺愨晲鈺愨晲鈺愨晲鈺?寮€濮嬮儴缃插墠绔?鈺愨晲鈺愨晲鈺愨晲鈺?

            # 0. 棰勬: 纾佺洏绌洪棿 + 鐜淇℃伅 + 娓呯悊 lock 鏂囦欢
            echo "馃攳 棰勬..."
            echo "   Node.js: $(node -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   npm: $(npm -v 2>/dev/null || echo 'NOT FOUND')"
            echo "   whoami: $(whoami)"
            echo "   纾佺洏: $(df -h / 2>/dev/null | tail -1)"
            echo "   鍐呭瓨: $(free -m 2>/dev/null | grep Mem | awk '{print $2 "MB total, " $4 "MB free"}')"
            echo "馃洃 娓呯悊鍙兘鍗′綇鐨勫墠绔瀯寤鸿繘绋?.."
            pkill -f "next build" 2>/dev/null || true
            pkill -f "npm run build" 2>/dev/null || true
            DISK_USAGE=$(df -h / | awk 'NR==2{print $5}' | tr -d '%')
            echo "   纾佺洏浣跨敤鐜? ${DISK_USAGE}%"
            if [ "$DISK_USAGE" -gt 85 ]; then
              echo "鈿狅笍  纾佺洏浣跨敤鐜囪秴杩?85%锛屽皾璇曟竻鐞嗙┖闂?.."
              sudo journalctl --vacuum-size=50M 2>/dev/null || true
              sudo apt-get clean 2>/dev/null || true
              sudo rm -rf /tmp/webpack* /tmp/npm-* 2>/dev/null || true
              # Also clean npm cache which can grow large
              sudo npm cache clean --force 2>/dev/null || true
              echo "   娓呯悊鍚庣鐩? $(df -h / 2>/dev/null | tail -1)"
            fi

            # 1. 鍚屾鏈€鏂颁唬鐮?            cd /opt/OmniFate

            # 淇鐩綍鏉冮檺 (root 鎷ユ湁鐨勬枃浠?deploy 鐢ㄦ埛鏃犳硶鍐欏叆)
            echo "馃敡 淇鐩綍鏉冮檺..."
            sudo chown -R $(whoami) /opt/OmniFate 2>/dev/null || true

            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "褰撳墠 commit: $CURRENT_COMMIT"
            echo "褰撳墠 commit message: $(git log -1 --format='%s')"

            echo "馃摜 鍚屾鏈€鏂颁唬鐮?.."
            # 褰诲簳娓呯悊 git lock 鏂囦欢锛堢敤 sudo 纭繚鍒犻櫎鏉冮檺锛?            sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            # 娓呴櫎杩囨湡鐨勮繙绋嬭窡韪紩鐢紝闃叉蹇€熻繛缁帹閫佸鑷?ref 鍐茬獊
            git remote prune origin 2>/dev/null || true
            git update-ref -d refs/remotes/origin/main 2>/dev/null || true
            git fetch origin main || {
              echo "鈿狅笍 git fetch 澶辫触锛屾竻鐞嗗悗閲嶈瘯..."
              sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/.git 2>/dev/null || true
              git fetch origin main
            }
            git clean -fd 2>/dev/null || true
            sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
            git reset --hard origin/main || {
              echo "鈿狅笍 git reset 澶辫触锛屽皾璇曚慨澶嶆潈闄愬悗閲嶈瘯..."
              sudo rm -f /opt/OmniFate/.git/index.lock 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/.git 2>/dev/null || true
              chmod -R u+w frontend/ 2>/dev/null || true
              git reset --hard origin/main
            }

            # 2. 閮ㄧ讲 Nginx 閰嶇疆 (璺宠繃濡傛灉 sites-available 涓嶅瓨鍦?
            echo "馃寪 鏇存柊 Nginx 閰嶇疆..."
            if [ -d /etc/nginx/sites-available ]; then
              cp /opt/OmniFate/nginx-khanfate.conf /etc/nginx/sites-available/khanfate.conf
              ln -sf /etc/nginx/sites-available/khanfate.conf /etc/nginx/sites-enabled/
              nginx -t 2>/dev/null && systemctl reload nginx && echo "鉁?Nginx 宸叉洿鏂? || echo "鈿狅笍 Nginx 閰嶇疆妫€鏌ュけ璐?
            else
              echo "鈿狅笍 /etc/nginx/sites-available 涓嶅瓨鍦紝璺宠繃 Nginx 閰嶇疆鏇存柊"
            fi

            # 3. 妫€娴嬮儴缃叉柟寮? Docker 鎴?PM2
            if command -v docker >/dev/null 2>&1 && [ -f docker-compose.yml ]; then
              echo "馃惓 妫€娴嬪埌 Docker锛岄噸鏂版瀯寤哄苟閮ㄧ讲鍓嶇瀹瑰櫒..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build frontend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend
              echo "鈴?绛夊緟瀹瑰櫒鍚姩..."
              sleep 10
            else
              echo "馃摝 浣跨敤 PM2 閮ㄧ讲鍓嶇..."

              # 鈿狅笍 鍏堟瀯寤猴紝鎴愬姛鍚庡啀鍋滄棫鏈嶅姟 鈥?闃叉鏋勫缓澶辫触瀵艰嚧缃戠珯涓嬬嚎
              cd /opt/OmniFate/frontend
              sudo chown -R $(whoami) . 2>/dev/null || true

              echo "Preparing low-memory build environment..."
              TOTAL_MEM_MB=$(free -m | awk '/^Mem:/{print $2}' 2>/dev/null || echo 0)
              SWAP_MB=$(free -m | awk '/^Swap:/{print $2}' 2>/dev/null || echo 0)
              if [ "${TOTAL_MEM_MB:-0}" -lt 3000 ] && [ "${SWAP_MB:-0}" -lt 1024 ]; then
                echo "   Memory ${TOTAL_MEM_MB}MB, swap ${SWAP_MB}MB; creating temporary 2GB swap..."
                if swapon --show=NAME | grep -qx "/swapfile-frontend-build"; then
                  echo "   Existing temporary swap is already active"
                else
                  sudo swapoff /swapfile-frontend-build 2>/dev/null || true
                  sudo rm -f /swapfile-frontend-build 2>/dev/null || true
                  sudo fallocate -l 2G /swapfile-frontend-build 2>/dev/null || sudo dd if=/dev/zero of=/swapfile-frontend-build bs=1M count=2048
                  sudo chmod 600 /swapfile-frontend-build
                  sudo mkswap /swapfile-frontend-build >/dev/null
                  if sudo swapon /swapfile-frontend-build; then
                    echo "   Temporary swap enabled"
                  else
                    echo "   Warning: could not enable temporary swap; continuing with low-memory build"
                  fi
                fi
              else
                echo "   Memory ${TOTAL_MEM_MB}MB, swap ${SWAP_MB}MB; temporary swap not needed"
              fi
              free -m

              echo "馃Ч 娓呯悊鏃ф瀯寤轰骇鐗?+ webpack 缂撳瓨..."
              sudo rm -rf /opt/OmniFate/frontend/.next 2>/dev/null || true
              sudo rm -rf /opt/OmniFate/frontend/.turbo 2>/dev/null || true
              sudo rm -rf /opt/OmniFate/frontend/node_modules/.cache 2>/dev/null || true
              sudo rm -rf /tmp/webpack* 2>/dev/null || true
              sudo rm -rf /root/.cache/webpack* 2>/dev/null || true
              sudo rm -rf /tmp/turbopack* 2>/dev/null || true
              sudo rm -rf /root/.cache/turbopack* 2>/dev/null || true
              sudo rm -rf /tmp/next-* 2>/dev/null || true
              # Clear any leftover Next.js trace files
              sudo rm -f /opt/OmniFate/frontend/.next 2>/dev/null || true
              echo "鉁?娓呯悊瀹屾垚"

              echo "馃摜 瀹夎渚濊禆..."
              npm install --production=false
              sudo chown -R $(whoami) . 2>/dev/null || true

              # 鈿狅笍 鏋勫缓鍓嶅啀娆℃竻鐞?.next锛岄槻姝㈡棫 root 鏉冮檺鐩綍瀵艰嚧 EACCES
              sudo rm -rf /opt/OmniFate/frontend/.next 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              echo "馃敤 鏋勫缓鐢熶骇鐗堟湰 (standalone)..."
              # 鈿狅笍 绂佺敤 webpack 缂撳瓨锛岀‘淇濇瘡娆℃瀯寤洪兘鏄叏鏂扮殑
              NODE_OPTIONS="--max-old-space-size=1536" NODE_ENV=production NEXT_TELEMETRY_DISABLED=1 NEXT_LOW_MEMORY_BUILD=1 npm run build
              # 鈿狅笍 鍏抽敭: build 杩囩▼涓細浠?root 鍒涘缓 .next/types/ 鍜?.next/standalone/ 绛夌洰褰?              # 蹇呴』鍦?build 鍚?chown锛屽惁鍒欎笅娆℃瀯寤轰細鍥?EACCES 澶辫触
              sudo chown -R $(whoami) .next 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              # 鈹€鈹€ Verify build output 鈹€鈹€
              echo "馃攳 楠岃瘉鏋勫缓浜х墿..."
              BUILD_PAGE_COUNT=$(find .next/server/app -name "*.html" 2>/dev/null | wc -l)
              # Also check for SSG manifest (Next.js 15 may not produce .html in server/app)
              SSG_MANIFEST=$(find .next/server -name "_ssgManifest.js" -o -name "_app-dev-indicator.js" 2>/dev/null | wc -l)
              echo "   Pre-rendered pages: $BUILD_PAGE_COUNT, SSG manifest: $SSG_MANIFEST"
              if [ "$BUILD_PAGE_COUNT" -lt 1 ] && [ "$SSG_MANIFEST" -lt 1 ]; then
                echo "鈿狅笍  鏋勫缓寮傚父: 娌℃湁鎵惧埌棰勬覆鏌撻〉闈㈡垨 SSG 浜х墿锛堥潪鑷村懡锛岀户缁儴缃诧級"
              fi

              # Determine standalone path 鈥?prioritize where server.js actually lives
              STANDALONE_DIR=""
              if [ -f ".next/standalone/server.js" ]; then
                STANDALONE_DIR=".next/standalone"
              elif [ -d ".next/standalone/frontend" ] && [ -f ".next/standalone/frontend/server.js" ]; then
                STANDALONE_DIR=".next/standalone/frontend"
              else
                echo "鉂?鏈壘鍒?standalone 鐩綍"
                ls -la .next/standalone/ 2>/dev/null || echo "   .next/standalone 涓嶅瓨鍦?
                exit 1
              fi
              echo "   Standalone 鐩綍: $STANDALONE_DIR"

              # 鈿狅笍 鍏抽敭: 澶嶅埗 static 鍜?public 鍒?standalone 鐩綍
              # standalone 鏋勫缓鍙兘涓嶅寘鍚畬鏁寸殑 .next/static锛屽繀椤绘墜鍔ㄥ悓姝?              # 鈿狅笍 蹇呴』鍏?rm -rf 鍐?mkdir + cp锛屽惁鍒?cp -r 浼氬悎骞惰€岄潪鏇挎崲
              echo "馃搵 澶嶅埗闈欐€佹枃浠跺埌 standalone 鐩綍..."
              echo "   褰撳墠鐩綍: $(pwd)"

              # 璇︾粏妫€鏌ユ簮鐩綍
              echo "   === 婧愮洰褰?.next/static/ 鍐呭 ==="
              find .next/static/ -type f -name "*.js" 2>/dev/null | wc -l | xargs echo "   JS 鏂囦欢鎬绘暟:"
              find .next/static/chunks/ -type f 2>/dev/null | wc -l | xargs echo "   chunks 鐩綍鏂囦欢鎬绘暟:"

              # 娓呯悊鐩爣鐩綍
              sudo rm -rf "$STANDALONE_DIR/.next/static" 2>/dev/null || true
              sudo mkdir -p "$STANDALONE_DIR/.next/static"

              # 澶嶅埗闈欐€佹枃浠?              # 鈿狅笍 CRITICAL: Do NOT use `cp -r .next/static/*` 鈥?bash glob expansion
              # interprets `[locale]` directory name as a character class `[cl oe]`,
              # causing the entire app/ subtree (including checkout chunks) to be skipped.
              # Use tar pipe to copy contents 鈥?bypasses glob expansion entirely.
              echo "   === 鎵ц澶嶅埗 ==="
              sudo tar cf - -C .next/static . | sudo tar xf - -C "$STANDALONE_DIR/.next/static/" || { echo "鉂?cp static 澶辫触"; exit 1; }
              echo "   cp static 瀹屾垚"

              # 澶嶅埗 public
              sudo rm -rf "$STANDALONE_DIR/public" 2>/dev/null || true
              sudo cp -r public "$STANDALONE_DIR/public" 2>/dev/null || true

              # 鈿狅笍 鍏抽敭: 鍚屾 BUILD_ID 鍜?build manifest锛岀‘淇?standalone 鐨?RSC manifest
              # 涓?static 鏂囦欢涓殑 chunk hash 涓€鑷达紝闃叉鏈嶅姟鍣ㄨ繑鍥炴棫 chunk 寮曠敤
              echo "   === 鍚屾鏋勫缓 manifest 鍒?standalone ==="
              sudo cp -f .next/BUILD_ID "$STANDALONE_DIR/.next/BUILD_ID" 2>/dev/null || true
              sudo cp -f .next/build-manifest.json "$STANDALONE_DIR/.next/build-manifest.json" 2>/dev/null || true
              sudo cp -f .next/prerender-manifest.json "$STANDALONE_DIR/.next/prerender-manifest.json" 2>/dev/null || true
              sudo cp -f .next/routes-manifest.json "$STANDALONE_DIR/.next/routes-manifest.json" 2>/dev/null || true
              sudo cp -f .next/images-manifest.json "$STANDALONE_DIR/.next/images-manifest.json" 2>/dev/null || true
              # Sync server manifests (contain chunk mappings used by RSC)
              if [ -d ".next/server" ] && [ -d "$STANDALONE_DIR/.next/server" ]; then
                sudo cp -f .next/server/middleware-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/next-font-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/pages-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/app-paths-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                sudo cp -f .next/server/server-reference-manifest.json "$STANDALONE_DIR/.next/server/" 2>/dev/null || true
                echo "   鉁?server manifests 宸插悓姝?
              fi
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              # 楠岃瘉鐩爣鐩綍 (鐢?|| true 闃叉 set -e 璇€€鍑?
              JS_COUNT=$(find "$STANDALONE_DIR/.next/static/" -type f -name "*.js" 2>/dev/null | wc -l || echo 0)
              CHUNK_COUNT_L=$(find "$STANDALONE_DIR/.next/static/chunks/" -type f 2>/dev/null | wc -l || echo 0)
              echo "   JS 鏂囦欢鎬绘暟: $JS_COUNT, chunks 鏂囦欢鎬绘暟: $CHUNK_COUNT_L"

              # 鈿狅笍 楠岃瘉: standalone 鐩綍蹇呴』鍖呭惈 chunks锛屽惁鍒欓儴缃蹭細鐧借窇
              CHUNK_COUNT=$(find "$STANDALONE_DIR/.next/static/chunks" -name "*.js" 2>/dev/null | wc -l || echo 0)
              if [ "$CHUNK_COUNT" -lt 10 ]; then
                echo "鉂?楠岃瘉澶辫触: standalone 鐩綍鍙湁 $CHUNK_COUNT 涓?chunk 鏂囦欢锛堥鏈?>10锛?
                echo "   杩欏彲鑳藉鑷撮〉闈?404锛屼絾缁х画閮ㄧ讲..."
                # Don't exit 鈥?the build may have restructured chunks
              fi

              # 鈿狅笍 楠岃瘉: 妫€娴嬪祵濂楄矾寰勯敊璇?(static/static/chunks)
              NESTED_COUNT=$(find "$STANDALONE_DIR/.next/static/static" -name "*.js" 2>/dev/null | wc -l || echo 0)
              if [ "$NESTED_COUNT" -gt 0 ]; then
                echo "鉂?妫€娴嬪埌宓屽鐩綍閿欒: static/static/ (鍏?$NESTED_COUNT 涓枃浠?"
                echo "   淇涓? 绉诲姩鏂囦欢鍒版纭綅缃?.."
                sudo mv "$STANDALONE_DIR/.next/static/static/"* "$STANDALONE_DIR/.next/static/" 2>/dev/null || true
                sudo rm -rf "$STANDALONE_DIR/.next/static/static"
                echo "鉁?宸蹭慨澶嶅祵濂楃洰褰?
              fi
