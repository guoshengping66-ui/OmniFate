# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 后端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 backend/ 有变更，或手动触发
#  流程: SSH → git pull → 重启 uvicorn → 健康检查 → 失败自动回滚
#
#  需要在 GitHub repo Settings → Secrets 中配置:
#    SERVER_HOST     — 阿里云服务器 IP
#    SERVER_USER     — SSH 用户名 (root)
#    SSH_PRIVATE_KEY — SSH 私钥
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要前一个 commit 用于回滚

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "═══════ 开始部署后端 ═══════"
            cd /opt/OmniFate

            # 1. 记录当前 commit (用于回滚)
            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"

            # 2. 拉取最新代码
            echo "📥 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "新 commit: $NEW_COMMIT"

            if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ]; then
              echo "✅ 代码无变化，跳过部署"
              exit 0
            fi

            # 3. 安装/更新 Python 依赖 (如果有变化)
            if git diff --name-only "$CURRENT_COMMIT" "$NEW_COMMIT" | grep -q "requirements.txt"; then
              echo "📦 更新 Python 依赖..."
              pip3 install -r requirements.txt -q
            fi

            # 4. 停止 systemd 服务，避免端口冲突
            echo "🔄 停止 systemd 服务..."
            systemctl stop omnifate-backend 2>/dev/null || true
            sleep 2

            # 5. 杀掉残留进程
            PID=$(lsof -ti :8002 2>/dev/null || true)
            if [ -n "$PID" ]; then
              kill "$PID" 2>/dev/null || true
              sleep 2
            fi

            # 6. 禁用 systemd 服务，用 nohup 管理
            echo "🚫 禁用 systemd 服务..."
            systemctl disable omnifate-backend 2>/dev/null || true

            # 7. 启动新的 uvicorn (后台运行)
            echo "🚀 启动新服务..."
            cd /opt/OmniFate
            nohup python3.9 -m uvicorn backend.main:app \
              --host 127.0.0.1 --port 8002 \
              --log-level info > /tmp/uvicorn.log 2>&1 &
            NEW_PID=$!
            echo "新进程 PID: $NEW_PID"

            # 8. 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 8

            # 9. 健康检查 (最多重试 5 次，间隔 5 秒)
            echo "🔍 健康检查..."
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTH_OK=true
                echo "✅ 健康检查通过 (第${i}次)"
                break
              fi
              echo "⚠️ 第${i}次健康检查失败 (HTTP $HTTP_CODE)，等待重试..."
              sleep 5
            done

            # 10. 健康检查失败 → 自动回滚
            if [ "$HEALTH_OK" = "false" ]; then
              echo "❌ 健康检查失败！自动回滚到 $CURRENT_COMMIT ..."
              cd /opt/OmniFate
              git reset --hard "$CURRENT_COMMIT"

              # 杀掉失败的进程
              PID=$(lsof -ti :8002 2>/dev/null || true)
              if [ -n "$PID" ]; then
                kill "$PID" 2>/dev/null || true
              fi
              sleep 3

              # 启动旧版本
              nohup python3.9 -m uvicorn backend.main:app \
                --host 127.0.0.1 --port 8002 \
                --log-level info > /tmp/uvicorn.log 2>&1 &

              sleep 8
              ROLLBACK_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/health || echo "000")
              if [ "$ROLLBACK_CODE" = "200" ]; then
                echo "✅ 回滚成功，旧版本运行正常"
              else
                echo "❌ 回滚也失败了！请手动检查服务器"
              fi
              exit 1
            fi

            echo "═══════ 部署完成 ═══════"
            echo "✅ 后端已更新: $CURRENT_COMMIT → $NEW_COMMIT"
