# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 全自动部署 (GitHub Actions)
# ══════════════════════════════════════════════════════════════════════════════
#  触发条件: push 到 main 分支
#  自动部署: 前端 (Vercel) + 后端 (Docker)
#
#  需要配置 GitHub Secrets:
#    VERCEL_TOKEN     — Vercel API Token (从 https://vercel.com/account/tokens 获取)
#    VERCEL_ORG_ID    — Vercel Org ID (运行 vercel link 后从 .vercel/project.json 获取)
#    VERCEL_PROJECT_ID — Vercel Project ID (同上)
#    SERVER_HOST      — 服务器 IP 地址
#    SERVER_USER      — SSH 用户名 (如 root)
#    SSH_PRIVATE_KEY   — SSH 私钥
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy (Frontend + Backend)

on:
  push:
    branches: [main]

  workflow_dispatch:  # 允许手动触发

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  #  前端部署 — Vercel
  # ════════════════════════════════════════════════════════════════════════════
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build Frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Verify Frontend
        run: |
          echo "=== 验证前端部署 ==="
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://khanfate.com/")
          if [ "$STATUS" = "200" ]; then
            echo "✓ 前端部署成功 — https://khanfate.com (HTTP $STATUS)"
          else
            echo "✗ 前端验证失败 — HTTP $STATUS"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  #  后端部署 — Docker
  # ════════════════════════════════════════════════════════════════════════════
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            echo "=========================================="
            echo "  命盘智镜 后端自动部署"
            echo "  Time: $(date)"
            echo "  Commit: ${{ github.sha }}"
            echo "=========================================="

            # 1. 定位项目目录
            PROJECT_DIR=""
            for dir in /root/destiny-platform /opt/destiny-platform /www/destiny-platform /home/*/destiny-platform ~/destiny-platform; do
              if [ -d "$dir/backend" ] && [ -f "$dir/docker-compose.yml" ]; then
                PROJECT_DIR="$dir"
                break
              fi
            done

            if [ -z "$PROJECT_DIR" ]; then
              echo "[ERROR] 未找到项目目录"
              exit 1
            fi

            echo "[1/4] 项目目录: $PROJECT_DIR"
            cd "$PROJECT_DIR"

            # 2. 拉取最新代码
            echo "[2/4] 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            echo "  当前版本: $(git log --oneline -1)"

            # 3. 重建并重启后端
            echo "[3/4] 重建后端 Docker 容器..."
            if docker compose version &>/dev/null; then
              docker compose down backend 2>/dev/null || true
              docker compose build backend --no-cache
              docker compose up -d backend
            else
              docker-compose down backend 2>/dev/null || true
              docker-compose build backend --no-cache
              docker-compose up -d backend
            fi

            # 4. 等待启动并验证
            echo "[4/4] 等待后端启动..."
            sleep 10

            HEALTH=$(curl -s http://localhost:8002/health 2>/dev/null || echo '{"status":"error"}')
            echo "  健康检查: $HEALTH"

            if echo "$HEALTH" | grep -q '"ok"'; then
              echo ""
              echo "=========================================="
              echo "  后端部署成功!"
              echo "=========================================="
            else
              echo ""
              echo "=========================================="
              echo "  后端部署可能失败，请检查日志"
              echo "  docker compose logs --tail=50 backend"
              echo "=========================================="
              exit 1
            fi

  # ════════════════════════════════════════════════════════════════════════════
  #  部署验证
  # ════════════════════════════════════════════════════════════════════════════
  verify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    timeout-minutes: 3
    steps:
      - name: Final verification
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  部署完成 — 最终验证"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""

          # 前端验证
          FE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://khanfate.com/")
          echo "前端: https://khanfate.com — HTTP $FE_STATUS"

          # 后端验证
          BE_HEALTH=$(curl -s "https://api.khanfate.com/health" 2>/dev/null)
          echo "后端: https://api.khanfate.com — $BE_HEALTH"

          # GZip 验证
          GZIP=$(curl -sI -H "Accept-Encoding: gzip" "https://api.khanfate.com/health" 2>/dev/null | grep -i "content-encoding")
          if echo "$GZIP" | grep -qi "gzip"; then
            echo "GZip: ✓ 已启用"
          else
            echo "GZip: ✗ 未启用"
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  所有服务已部署!"
          echo "  前端: https://khanfate.com"
          echo "  后端: https://api.khanfate.com"
          echo "═══════════════════════════════════════════════════════════════"
