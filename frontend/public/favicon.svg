<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#b8963e"/>
    </linearGradient>
  </defs>
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0a0f"/>
  <!-- Gold ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Sparkle / star shape -->
  <g transform="translate(32,32)">
    <!-- 4-point star -->
    <polygon points="0,-16 3.5,-4 16,-3.5 4,0 16,3.5 3.5,4 0,16 -3.5,4 -16,3.5 -4,0 -16,-3.5 -3.5,-4" fill="url(#gold)"/>
    <!-- Small decorative dots -->
    <circle cx="-20" cy="-14" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="20" cy="14" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="-14" cy="20" r="0.8" fill="#c9a84c" opacity="0.4"/>
    <circle cx="14" cy="-20" r="0.8" fill="#c9a84c" opacity="0.4"/>
  </g>
</svg>
