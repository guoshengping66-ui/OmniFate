# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — Nginx 配置 (khanfate.com)
# ══════════════════════════════════════════════════════════════════════════════
#  部署: cp nginx-khanfate.conf /etc/nginx/sites-available/khanfate.conf
#        ln -sf /etc/nginx/sites-available/khanfate.conf /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name khanfate.com www.khanfate.com;
    return 301 https://$host$request_uri;
}

# Main site — frontend on port 3000
server {
    listen 443 ssl http2;
    server_name khanfate.com www.khanfate.com;

    ssl_certificate     /etc/letsencrypt/live/khanfate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khanfate.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        # Hide Next.js's own Cache-Control to avoid duplicate headers
        proxy_hide_header Cache-Control;
        # Long cache + stale-while-revalidate: Cloudflare serves stale
        # content during deploys instead of caching transient 404s
        add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=86400";
        # Intercept 404s from upstream so Cloudflare never caches stale chunk 404s
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_static;
    location @notfound_static {
        add_header Cache-Control "no-store" always;
        add_header Surrogate-Control "no-store" always;
        add_header CDN-Cache-Control "no-store" always;
        return 404;
    }

    # PWA manifest — exact match with moderate cache
    location = /manifest.json {
        proxy_pass http://127.0.0.1:3000;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_manifest;
    location @notfound_manifest {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # Robots and favicon — exact match with moderate cache
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_robots;
    location @notfound_robots {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    location = /favicon.svg {
        proxy_pass http://127.0.0.1:3000;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_favicon;
    location @notfound_favicon {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # Logo images — exact match with moderate cache
    location = /logo.png {
        proxy_pass http://127.0.0.1:3000;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_logo;
    location @notfound_logo {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    location = /logo-192.png {
        proxy_pass http://127.0.0.1:3000;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        proxy_intercept_errors on;
    }
    error_page 404 = @notfound_logo192;
    location @notfound_logo192 {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # HTML pages — NEVER cache. After each deploy new chunk hashes are
    # generated; serving stale HTML causes ChunkLoadError (404 on old chunks).
    # This takes precedence over Next.js / Cloudflare defaults.

    # Redirect root to /en/ — avoids Next.js middleware generating localhost URLs
    location = / {
        return 307 https://$host/en/;
    }

    location ~* ^/(?!_next/static/|api/|favicon|logo|og|robots\.txt|manifest\.json).*$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Region detection: pass Cloudflare headers to Next.js
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;

        # Force no-cache for HTML pages — prevents stale chunks after deploy
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Cloudflare: multiple headers to ensure HTML is NEVER cached
        # CDN-Cache-Control is prioritized by Cloudflare over Surrogate-Control
        add_header Surrogate-Control "no-store" always;
        add_header CDN-Cache-Control "no-store" always;

        # Long timeout for SSE proxy (Next.js proxy → backend can take 5-8 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Fallback for anything not matched above
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Region detection: pass Cloudflare headers to Next.js
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;

        # Prevent Cloudflare from caching HTML in fallback location too
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Surrogate-Control "no-store" always;
        add_header CDN-Cache-Control "no-store" always;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}

# Backend API — port 8003
server {
    listen 443 ssl http2;
    server_name api.khanfate.com;

    ssl_certificate     /etc/letsencrypt/live/khanfate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khanfate.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip
    gzip on;
    gzip_types application/json;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for analysis endpoints (two-call LLM can take 5-8 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

