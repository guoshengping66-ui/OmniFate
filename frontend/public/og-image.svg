<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0F2E"/>
      <stop offset="60%" style="stop-color:#0D0715"/>
      <stop offset="100%" style="stop-color:#050208"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="600" cy="200" r="300" fill="url(#glow)"/>

  <!-- Decorative ring -->
  <circle cx="600" cy="315" r="250" fill="none" stroke="#C9A84C" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Stars - top right -->
  <circle cx="920" cy="60" r="3" fill="#C9A84C" opacity="0.6"/>
  <circle cx="980" cy="120" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="1050" cy="80" r="4" fill="#C9A84C" opacity="0.7"/>
  <circle cx="1100" cy="180" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="850" cy="150" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="1000" cy="200" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="1120" cy="100" r="3" fill="#C9A84C" opacity="0.5"/>

  <!-- Stars - bottom left -->
  <circle cx="80" cy="480" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="150" cy="520" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="200" cy="460" r="4" fill="#C9A84C" opacity="0.6"/>
  <circle cx="120" cy="550" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="250" cy="510" r="3" fill="#C9A84C" opacity="0.5"/>

  <!-- Scattered stars -->
  <circle cx="400" cy="40" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="700" cy="580" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="1100" cy="400" r="3" fill="#C9A84C" opacity="0.4"/>
  <circle cx="50" cy="200" r="2" fill="#C9A84C" opacity="0.3"/>

  <!-- Brand name - Chinese -->
  <text x="600" y="260" text-anchor="middle" font-family="'Noto Serif SC', 'SimSun', serif" font-size="72" font-weight="700" fill="#C9A84C" letter-spacing="12">命盘智镜</text>

  <!-- Brand name - English -->
  <text x="600" y="300" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" letter-spacing="8">DESTINY MIRROR</text>

  <!-- Divider line -->
  <line x1="540" y1="340" x2="660" y2="340" stroke="url(#divider)" stroke-width="1"/>

  <!-- Five systems -->
  <text x="340" y="390" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="20" font-weight="600" fill="#E8CB7A">八字</text>
  <text x="340" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Bazi</text>

  <circle cx="400" cy="393" r="2" fill="#C9A84C" opacity="0.4"/>

  <text x="460" y="390" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="20" font-weight="600" fill="#E8CB7A">星盘</text>
  <text x="460" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Astrology</text>

  <circle cx="520" cy="393" r="2" fill="#C9A84C" opacity="0.4"/>

  <text x="600" y="390" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="20" font-weight="600" fill="#E8CB7A">塔罗</text>
  <text x="600" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Tarot</text>

  <circle cx="680" cy="393" r="2" fill="#C9A84C" opacity="0.4"/>

  <text x="740" y="390" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="20" font-weight="600" fill="#E8CB7A">面相</text>
  <text x="740" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Face</text>

  <circle cx="800" cy="393" r="2" fill="#C9A84C" opacity="0.4"/>

  <text x="860" y="390" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="20" font-weight="600" fill="#E8CB7A">手相</text>
  <text x="860" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Palm</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.45)" letter-spacing="2">Multi-Dimension AI Destiny Analysis</text>

  <!-- Footer divider -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#C9A84C" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Footer text -->
  <text x="60" y="600" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">AI-POWERED DESTINY ANALYSIS</text>
  <text x="1140" y="600" text-anchor="end" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">khanfate.com</text>
</svg>
