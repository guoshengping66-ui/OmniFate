<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命盘智镜 · 星空八卦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    overflow: hidden;
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    height: 100vh;
    width: 100vw;
    cursor: default;
    user-select: none;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  #stars-canvas { z-index: 1; }
  #galaxy-canvas { z-index: 2; }
  #bagua-canvas { z-index: 3; }

  .overlay-text {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    text-align: center;
    pointer-events: none;
  }

  .overlay-text .title {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: rgba(201, 168, 76, 0.85);
    letter-spacing: 0.25em;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.3), 0 0 80px rgba(201, 168, 76, 0.1);
    margin-bottom: 0.4em;
  }

  .overlay-text .subtitle {
    font-size: clamp(0.7rem, 1.2vw, 0.85rem);
    color: rgba(180, 160, 200, 0.5);
    letter-spacing: 0.35em;
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="galaxy-canvas"></canvas>
<canvas id="bagua-canvas"></canvas>

<div class="overlay-text">
  <div class="title">命 盘 智 镜</div>
  <div class="subtitle">PROFILE MIRROR</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Layer 1: Deep Starfield — 3 tiers of stars with independent twinkle
// ═══════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  const stars = [];
  const STAR_COUNTS = { far: 400, mid: 120, near: 40 };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    stars.length = 0;
    const total = STAR_COUNTS.far + STAR_COUNTS.mid + STAR_COUNTS.near;
    for (let i = 0; i < total; i++) {
      let tier, baseSize, twinkleSpeed, twinkleAmp, baseAlpha;
      if (i < STAR_COUNTS.near) {
        tier = 'near';
        baseSize = 1.2 + Math.random() * 2.0;
        twinkleSpeed = 0.008 + Math.random() * 0.015;
        twinkleAmp = 0.4 + Math.random() * 0.5;
        baseAlpha = 0.6 + Math.random() * 0.35;
      } else if (i < STAR_COUNTS.near + STAR_COUNTS.mid) {
        tier = 'mid';
        baseSize = 0.5 + Math.random() * 1.2;
        twinkleSpeed = 0.003 + Math.random() * 0.01;
        twinkleAmp = 0.3 + Math.random() * 0.4;
        baseAlpha = 0.35 + Math.random() * 0.45;
      } else {
        tier = 'far';
        baseSize = 0.3 + Math.random() * 0.6;
        twinkleSpeed = 0.001 + Math.random() * 0.005;
        twinkleAmp = 0.15 + Math.random() * 0.3;
        baseAlpha = 0.15 + Math.random() * 0.35;
      }

      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: baseSize,
        phase: Math.random() * Math.PI * 2,
        speed: twinkleSpeed,
        amp: twinkleAmp,
        baseAlpha,
        tier,
        hue: Math.random() < 0.08 ? 30 + Math.random() * 20   // warm gold stars (8%)
             : Math.random() < 0.12 ? 220 + Math.random() * 30 // blue-white (12%)
             : 250 + Math.random() * 40,                       // cool white (80%)
        sat: Math.random() < 0.15 ? '60%' : '30%',
        light: 70 + Math.random() * 30,
      });
    }
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, W, H);

    // Deep space gradient base
    const baseGrad = ctx.createRadialGradient(W * 0.5, H * 0.45, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8);
    baseGrad.addColorStop(0, '#0e0a24');
    baseGrad.addColorStop(0.4, '#09081a');
    baseGrad.addColorStop(0.75, '#040510');
    baseGrad.addColorStop(1, '#010208');
    ctx.fillStyle = baseGrad;
    ctx.fillRect(0, 0, W, H);

    const t = timestamp * 0.001;

    for (const s of stars) {
      const twinkle = Math.sin(t * s.speed + s.phase) * s.amp + (1 - s.amp);
      const alpha = Math.max(0.05, s.baseAlpha * (0.5 + 0.5 * twinkle));
      const size = s.r * (0.8 + 0.2 * twinkle);

      ctx.beginPath();
      ctx.arc(s.x, s.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, ${s.sat}, ${s.light}%, ${alpha})`;
      ctx.fill();

      // Glow halo for near stars
      if (s.tier === 'near' && twinkle > 0.8) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 50%, 80%, ${alpha * 0.12})`;
        ctx.fill();
      }
    }

    // Subtle nebula patches
    [
      { x: W * 0.25, y: H * 0.3, r: Math.min(W, H) * 0.35, h: 270, a: 0.025 },
      { x: W * 0.72, y: H * 0.6, r: Math.min(W, H) * 0.28, h: 290, a: 0.02 },
      { x: W * 0.45, y: H * 0.25, r: Math.min(W, H) * 0.22, h: 250, a: 0.018 },
    ].forEach(n => {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, `hsla(${n.h}, 60%, 40%, ${n.a * 3})`);
      g.addColorStop(0.5, `hsla(${n.h}, 40%, 25%, ${n.a})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════════════════
// Layer 2: Flowing Galaxy Band — particle stream with Perlin-ish flow
// ═══════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  const PARTICLES = 600;
  const particles = [];
  const flowPath = []; // pre-computed flow curve

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    computeFlowPath();
    initParticles();
  }

  function computeFlowPath() {
    flowPath.length = 0;
    // Galaxy band: a diagonal S-curve from top-left to bottom-right
    const cx = W * 0.5;
    const cy = H * 0.5;
    const steps = 200;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const angle = -0.55 + t * 1.1; // sweep from -0.55 to 0.55 rad
      const dist = (t - 0.5) * Math.max(W, H) * 1.3;
      const x = cx + Math.cos(angle) * dist;
      const y = cy + Math.sin(angle) * dist * 0.65;
      flowPath.push({ x, y, t });
    }
  }

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < PARTICLES; i++) {
      resetParticle(particles.length === 0 ? null : i / PARTICLES);
    }
  }

  function resetParticle(forcedT) {
    const t = forcedT !== null ? forcedT : Math.random();
    const idx = Math.floor(t * (flowPath.length - 1));
    const pt = flowPath[Math.min(idx, flowPath.length - 1)];
    const spreadX = (Math.random() - 0.5) * 160;
    const spreadY = (Math.random() - 0.5) * 80;
    return {
      x: pt.x + spreadX,
      y: pt.y + spreadY,
      t: t,
      size: 0.3 + Math.random() * 1.8,
      alpha: 0.08 + Math.random() * 0.35,
      hue: 260 + Math.random() * 40,
      speed: 0.00008 + Math.random() * 0.00025,
      spreadX,
      spreadY,
    };
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, W, H);

    const t = timestamp * 0.001;

    // Soft glow along the band
    const bandGlow = ctx.createLinearGradient(
      W * 0.05, H * 0.15,
      W * 0.95, H * 0.75
    );
    bandGlow.addColorStop(0, 'rgba(40, 20, 80, 0.04)');
    bandGlow.addColorStop(0.3, 'rgba(60, 25, 100, 0.07)');
    bandGlow.addColorStop(0.5, 'rgba(80, 30, 120, 0.09)');
    bandGlow.addColorStop(0.7, 'rgba(50, 20, 90, 0.05)');
    bandGlow.addColorStop(1, 'rgba(20, 10, 50, 0.02)');
    ctx.fillStyle = bandGlow;
    ctx.fillRect(0, 0, W, H);

    // Draw particles
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      // Advance along the flow
      p.t += p.speed;
      if (p.t > 1.0) p.t -= 1.0;
      if (p.t < 0) p.t += 1.0;

      const idx = Math.floor(p.t * (flowPath.length - 1));
      const pt = flowPath[Math.min(idx, flowPath.length - 1)];

      // Smooth wobble
      const wave = Math.sin(t * 0.3 + p.t * 20) * 15;
      const wave2 = Math.cos(t * 0.25 + p.t * 15) * 10;
      p.x = pt.x + p.spreadX + wave;
      p.y = pt.y + p.spreadY + wave2;

      const alpha = p.alpha * (0.6 + 0.4 * Math.sin(t * 0.5 + p.t * 8));

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 50%, 65%, ${alpha})`;
      ctx.fill();

      // Glow on larger particles
      if (p.size > 1.0 && alpha > 0.15) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 40%, 60%, ${alpha * 0.1})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════════════════
// Layer 3: Bagua Diagram — floating, rotating, with golden glow
// ═══════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('bagua-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let baguaR = 0; // dynamic radius

  // Trigram definitions — Later Heaven (后天八卦) arrangement
  // Each trigram: array of 3 values, 1=yang(solid), 0=yin(broken)
  // Clockwise from top (Li 离)
  const trigrams = [
    { name: '离', lines: [1,0,1], angle: -Math.PI/2 },       // top
    { name: '巽', lines: [0,1,1], angle: -Math.PI/4 },       // top-right
    { name: '震', lines: [1,0,0], angle: 0 },                // right
    { name: '艮', lines: [0,0,1], angle: Math.PI/4 },        // bottom-right
    { name: '坎', lines: [0,1,0], angle: Math.PI/2 },        // bottom
    { name: '乾', lines: [1,1,1], angle: Math.PI*3/4 },      // bottom-left
    { name: '兑', lines: [1,1,0], angle: Math.PI },           // left
    { name: '坤', lines: [0,0,0], angle: -Math.PI*3/4 },     // top-left
  ];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    baguaR = Math.min(W, H) * 0.14;
  }

  function drawBagua(cx, cy, r, angle) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // Outer glow ring
    const glowGrad = ctx.createRadialGradient(0, 0, r * 0.82, 0, 0, r * 1.25);
    glowGrad.addColorStop(0, 'rgba(201, 168, 76, 0)');
    glowGrad.addColorStop(0.3, 'rgba(201, 168, 76, 0.08)');
    glowGrad.addColorStop(0.6, 'rgba(201, 168, 76, 0.18)');
    glowGrad.addColorStop(0.85, 'rgba(180, 140, 60, 0.06)');
    glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.25, 0, Math.PI * 2);
    ctx.fill();

    // Outer ring (gold)
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.55)';
    ctx.lineWidth = Math.max(1.2, r * 0.022);
    ctx.stroke();

    // Second ring
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.96, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.25)';
    ctx.lineWidth = Math.max(0.6, r * 0.008);
    ctx.stroke();

    // ═══ Tai Chi (Yin-Yang) center ═══
    const yinYangR = r * 0.52;

    // White (yang) half
    ctx.beginPath();
    ctx.arc(0, 0, yinYangR, 0, Math.PI, false);
    ctx.fillStyle = 'rgba(240, 235, 225, 0.9)';
    ctx.fill();

    // Black (yin) half
    ctx.beginPath();
    ctx.arc(0, 0, yinYangR, Math.PI, 0, false);
    ctx.fillStyle = 'rgba(8, 6, 18, 0.9)';
    ctx.fill();

    // Upper small circle (yang in yin — white dot in black half)
    ctx.beginPath();
    ctx.arc(0, -yinYangR * 0.5, yinYangR * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(240, 235, 225, 0.9)';
    ctx.fill();

    // Lower small circle (yin in yang — black dot in white half)
    ctx.beginPath();
    ctx.arc(0, yinYangR * 0.5, yinYangR * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(8, 6, 18, 0.9)';
    ctx.fill();

    // Center dot (gold)
    ctx.beginPath();
    ctx.arc(0, 0, yinYangR * 0.06, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201, 168, 76, 0.5)';
    ctx.fill();

    // Inner ring around tai chi
    ctx.beginPath();
    ctx.arc(0, 0, yinYangR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.3)';
    ctx.lineWidth = Math.max(0.6, r * 0.006);
    ctx.stroke();

    // ═══ 8 Trigrams ═══
    const trigramDist = r * 0.78;
    const triWidth = r * 0.06;
    const triGap = r * 0.015;
    const triLen = r * 0.13;

    for (const tri of trigrams) {
      const tx = Math.cos(tri.angle) * trigramDist;
      const ty = Math.sin(tri.angle) * trigramDist;

      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(tri.angle + Math.PI/2); // radial orientation

      for (let li = 0; li < 3; li++) {
        const ly = (li - 1) * (triLen / 3 + triGap);
        const isYang = tri.lines[li] === 1;

        if (isYang) {
          // Solid line
          ctx.fillStyle = 'rgba(201, 168, 76, 0.7)';
          ctx.fillRect(-triWidth, ly - triLen/6, triWidth * 2, triLen / 3);
        } else {
          // Broken line (two segments with gap)
          const segW = (triWidth * 2 - triGap * 3) / 2;
          ctx.fillStyle = 'rgba(201, 168, 76, 0.7)';
          ctx.fillRect(-triWidth, ly - triLen/6, segW, triLen / 3);
          ctx.fillRect(triWidth - segW, ly - triLen/6, segW, triLen / 3);
        }
      }

      ctx.restore();
    }

    ctx.restore();
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, W, H);

    const t = timestamp * 0.001;
    const cx = W * 0.5;
    const cy = H * 0.44;

    // Slow rotation: one full turn in ~120 seconds
    const angle = t * 0.052;

    // Gentle floating bobbing
    const floatY = Math.sin(t * 0.4) * baguaR * 0.06;
    const floatX = Math.cos(t * 0.35) * baguaR * 0.04;

    drawBagua(cx + floatX, cy + floatY, baguaR, angle);

    // Floating golden dust particles around bagua
    const dustCount = 12;
    for (let i = 0; i < dustCount; i++) {
      const da = (i / dustCount) * Math.PI * 2 + t * 0.2;
      const dd = baguaR * (1.3 + Math.sin(t * 0.6 + i * 2.1) * 0.35);
      const dx = cx + Math.cos(da) * dd;
      const dy = cy + Math.sin(da) * dd * 0.7;
      const ds = 0.6 + Math.sin(t * 1.2 + i) * 0.4;
      const da2 = 0.15 + Math.sin(t * 0.8 + i * 1.7) * 0.12;

      ctx.beginPath();
      ctx.arc(dx, dy, ds, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 168, 76, ${da2})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
