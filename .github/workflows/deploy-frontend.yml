# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — 前端自动部署 (GitHub Actions → 阿里云)
# ══════════════════════════════════════════════════════════════════════════════
#  触发: push 到 main 且 frontend/ 有变更，或手动触发
#  流程: SSH → git pull → npm build → PM2 restart
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'ecosystem.config.js'
      - 'deploy-frontend.sh'
      - 'nginx-khanfate.conf'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CF_ZONE_ID,CF_API_TOKEN
          script: |
            set -euo pipefail

            echo "═══════ 开始部署前端 ═══════"

            # 1. 同步最新代码
            cd /opt/OmniFate

            # 修复目录权限 (root 拥有的文件 deploy 用户无法写入)
            echo "🔧 修复目录权限..."
            sudo chown -R $(whoami) /opt/OmniFate 2>/dev/null || true

            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "当前 commit: $CURRENT_COMMIT"

            echo "📥 同步最新代码..."
            git fetch origin main
            git clean -fd 2>/dev/null || true
            git reset --hard origin/main || {
              echo "⚠️ git reset 失败，尝试修复权限后重试..."
              chmod -R u+w frontend/ 2>/dev/null || true
              git reset --hard origin/main
            }

            # 2. 部署 Nginx 配置 (跳过如果 sites-available 不存在)
            echo "🌐 更新 Nginx 配置..."
            if [ -d /etc/nginx/sites-available ]; then
              cp /opt/OmniFate/nginx-khanfate.conf /etc/nginx/sites-available/khanfate.conf
              ln -sf /etc/nginx/sites-available/khanfate.conf /etc/nginx/sites-enabled/
              nginx -t 2>/dev/null && systemctl reload nginx && echo "✅ Nginx 已更新" || echo "⚠️ Nginx 配置检查失败"
            else
              echo "⚠️ /etc/nginx/sites-available 不存在，跳过 Nginx 配置更新"
            fi

            # 3. 检测部署方式: Docker 或 PM2
            if command -v docker >/dev/null 2>&1 && [ -f docker-compose.yml ]; then
              echo "🐳 检测到 Docker，重新构建并部署前端容器..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build frontend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend
              echo "⏳ 等待容器启动..."
              sleep 10
            else
              echo "📦 使用 PM2 部署前端..."

              # ⚠️ 关键: 先停服务再清理 .next，避免新旧 chunk 哈希冲突导致 404
              echo "🛑 停止前端服务..."
              cd /opt/OmniFate
              pm2 delete frontend 2>/dev/null || true

              # 用 sudo 运行整个构建流程，避免 root 权限问题
              echo "🧹 彻底清理旧构建 + webpack 缓存..."
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true
              sudo rm -rf /opt/OmniFate/frontend/.next
              sudo rm -rf /opt/OmniFate/frontend/node_modules
              sudo rm -rf /opt/OmniFate/frontend/.turbo
              sudo rm -rf /tmp/webpack* 2>/dev/null || true
              sudo rm -rf /root/.cache/webpack* 2>/dev/null || true

              cd /opt/OmniFate/frontend
              sudo chown -R $(whoami) . 2>/dev/null || true
              npm ci --production=false || npm install
              sudo chown -R $(whoami) .next 2>/dev/null || true

              echo "🔨 构建生产版本 (standalone)..."
              NODE_ENV=production npm run build

              # ── Verify build output ──
              echo "🔍 验证构建产物..."
              BUILD_PAGE_COUNT=$(find .next/server/app -name "*.html" 2>/dev/null | wc -l)
              echo "   Pre-rendered pages: $BUILD_PAGE_COUNT"
              if [ "$BUILD_PAGE_COUNT" -lt 2 ]; then
                echo "❌ 构建异常: 只有 $BUILD_PAGE_COUNT 个预渲染页面（预期 >= 2）"
                exit 1
              fi

              # Determine standalone path
              STANDALONE_DIR=""
              if [ -d ".next/standalone/frontend" ]; then
                STANDALONE_DIR=".next/standalone/frontend"
              elif [ -f ".next/standalone/server.js" ]; then
                STANDALONE_DIR=".next/standalone"
              else
                echo "❌ 未找到 standalone 目录"
                ls -la .next/standalone/ 2>/dev/null || echo "   .next/standalone 不存在"
                exit 1
              fi
              echo "   Standalone 目录: $STANDALONE_DIR"

              # ⚠️ 关键: 复制 static 和 public 到 standalone 目录
              # standalone 构建可能不包含完整的 .next/static，必须手动同步
              echo "📋 复制静态文件到 standalone 目录..."
              sudo rm -rf "$STANDALONE_DIR/.next/static" 2>/dev/null || true
              sudo cp -r .next/static "$STANDALONE_DIR/.next/static"
              sudo rm -rf "$STANDALONE_DIR/public" 2>/dev/null || true
              sudo cp -r public "$STANDALONE_DIR/public" 2>/dev/null || true
              sudo chown -R $(whoami) /opt/OmniFate/frontend 2>/dev/null || true

              # ⚠️ 验证: standalone 目录必须包含 chunks，否则部署会白跑
              CHUNK_COUNT=$(find "$STANDALONE_DIR/.next/static/chunks" -name "*.js" 2>/dev/null | wc -l)
              if [ "$CHUNK_COUNT" -lt 10 ]; then
                echo "❌ 验证失败: standalone 目录只有 $CHUNK_COUNT 个 chunk 文件（预期 >10）"
                exit 1
              fi
              echo "✅ 验证通过: standalone 目录有 $CHUNK_COUNT 个 chunk 文件"

              # 🔑 关键验证: webpack chunk 必须存在，否则整个 JS 无法加载
              WEBPACK_CHUNK=$(find "$STANDALONE_DIR/.next/static/chunks" -name "webpack-*.js" 2>/dev/null | head -1)
              if [ -z "$WEBPACK_CHUNK" ]; then
                echo "❌ 验证失败: standalone 目录缺少 webpack chunk!"
                ls -la .next/static/chunks/webpack*.js 2>/dev/null || echo "   构建输出中也没有 webpack chunk!"
                exit 1
              fi
              echo "✅ Webpack chunk 验证通过: $(basename $WEBPACK_CHUNK)"

              # 🔑 验证: pre-rendered HTML 引用的 chunk 必须在 standalone 中存在
              BUILD_LAYOUT=$(find "$STANDALONE_DIR/.next/static/chunks/app" -name "layout-*.js" 2>/dev/null | head -1)
              if [ -n "$BUILD_LAYOUT" ]; then
                echo "   Layout chunk: $(basename $BUILD_LAYOUT)"
              else
                echo "❌ standalone 缺少 layout chunk!"
                exit 1
              fi

              # ── Purge Cloudflare cache for _next/static/ BEFORE restart ──
              # Prevents Cloudflare from caching stale 404s during the gap
              # when old chunks were deleted but new ones aren't served yet.
              if [ -n "${CF_ZONE_ID:-}" ] && [ -n "${CF_API_TOKEN:-}" ]; then
                echo "🔄 清除 Cloudflare 缓存 (防止旧 chunk 404 被缓存)..."
                # Purge everything — safest after a full rebuild
                PURGE_RESP=$(curl -s -w "\n%{http_code}" \
                  -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"purge_everything":true}')
                PURGE_HTTP=$(echo "$PURGE_RESP" | tail -1)
                if [ "$PURGE_HTTP" = "200" ]; then
                  echo "✅ Cloudflare 全局缓存已清除"
                else
                  echo "⚠️ Cloudflare 缓存清除返回 HTTP $PURGE_HTTP"
                  echo "   响应: $(echo "$PURGE_RESP" | head -1)"
                fi
              else
                echo "⚠️ 未配置 CF_ZONE_ID/CF_API_TOKEN，跳过 Cloudflare 缓存清除"
              fi

              echo "🔄 启动前端服务..."
              cd /opt/OmniFate
              pm2 start ecosystem.config.js --only frontend
              pm2 save

              sleep 5

              # Post-restart verification: check that the server is serving new chunks
              echo "🔍 验证服务器正在运行新构建..."
              SERVER_LAYOUT=$(curl -sk https://www.khanfate.com/api/version 2>/dev/null)
              echo "   Version endpoint: $SERVER_LAYOUT"

              # Verify HTML serves new chunk references
              # Store curl output in a variable first (avoids SIGPIPE when piped to head)
              HTML_RESPONSE=$(curl -sk https://www.khanfate.com/zh 2>/dev/null)
              HTML_LAYOUT_HASH=$(echo "$HTML_RESPONSE" | grep -oP 'layout-[a-f0-9]+\.js' | head -1)
              echo "   HTML layout chunk: $HTML_LAYOUT_HASH"

              EXPECTED_LAYOUT=$(basename "${STANDALONE_LAYOUT:-}" 2>/dev/null)
              if [ "$HTML_LAYOUT_HASH" = "$EXPECTED_LAYOUT" ]; then
                echo "✅ 部署验证通过: HTML 引用的 chunk 与构建产物匹配"
              else
                echo "⚠️  警告: HTML layout hash ($HTML_LAYOUT_HASH) 与预期 ($EXPECTED_LAYOUT) 不匹配"
                echo "   可能原因: Cloudflare 缓存未清除，或服务器未正确重启"
              fi
            fi

            # 4. 验证
            echo "🔍 验证服务..."
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ]; then
              echo "✅ 前端健康检查通过 (HTTP $HTTP_CODE)"
            else
              echo "⚠️ 前端健康检查返回 HTTP $HTTP_CODE，可能需要手动检查"
            fi

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "═══════ 部署完成 ═══════"
            echo "✅ 前端已更新: $CURRENT_COMMIT → $NEW_COMMIT"

      # ── Purge Cloudflare cache (prevents stale HTML → chunk 404) ──
      - name: Purge Cloudflare cache
        if: success() && vars.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_API_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🔄 清除 Cloudflare 全部缓存..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Cloudflare 缓存已清除"
          else
            echo "⚠️ Cloudflare 缓存清除返回 HTTP $HTTP_CODE"
            echo "   响应: $BODY"
          fi

          # Also purge specific critical URLs to be safe
          echo "🔄 额外清除关键页面缓存..."
          for URL in "https://www.khanfate.com/" "https://www.khanfate.com/zh" "https://www.khanfate.com/en"; do
            curl -s -o /dev/null \
              -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"files\":[\"$URL\"]}" && echo "   已清除: $URL" || echo "   ⚠️ 清除失败: $URL"
          done
