# ══════════════════════════════════════════════════════════════════════════════
#  命盘智镜 — Nginx 配置 (khanfate.com)
# ══════════════════════════════════════════════════════════════════════════════
#  部署: cp nginx-khanfate.conf /etc/nginx/sites-available/khanfate.conf
#        ln -sf /etc/nginx/sites-available/khanfate.conf /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name khanfate.com www.khanfate.com;
    return 301 https://$host$request_uri;
}

# Main site — frontend on port 3000
server {
    listen 443 ssl http2;
    server_name khanfate.com www.khanfate.com;

    ssl_certificate     /etc/letsencrypt/live/khanfate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khanfate.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # All other requests → Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for SSE proxy (Next.js proxy → backend can take 5-8 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}

# Backend API — port 8003
server {
    listen 443 ssl http2;
    server_name api.khanfate.com;

    ssl_certificate     /etc/letsencrypt/live/khanfate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khanfate.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip
    gzip on;
    gzip_types application/json;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for analysis endpoints (two-call LLM can take 5-8 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
